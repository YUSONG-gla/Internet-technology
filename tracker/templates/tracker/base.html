{% load static %}
<!doctype html>
<html>
  <head>
    <title>Finance Tracker</title>
    <link rel="stylesheet" href="{% static 'tracker/css/style.css' %}" />
  </head>

  <body>
    <nav>
      <h2>Finance Tracker</h2>

      {% if user.is_authenticated %}
      <a href="{% url 'dashboard' %}">Dashboard</a>
      <a href="{% url 'add_transaction' %}">Add Transaction</a>
      <a href="{% url 'add_category' %}">Add Category</a>
      <a href="{% url 'set_budget' %}">Set Budget</a>

      <span style="margin-left: 20px"> Welcome, {{ user.username }} </span>

      <a href="{% url 'logout' %}">Logout</a>
      {% endif %}
    </nav>

    <div class="container">{% block content %} {% endblock %}</div>
  </body>
</html>
